name: koraidv_flutter
description: Kora IDV Identity Verification SDK for Flutter. Thin wrapper over native iOS and Android SDKs via platform channels.
version: 1.2.0
homepage: https://github.com/koraidv/koraidv-flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.koraidv.flutter
        pluginClass: KoraIDVFlutterPlugin
      ios:
        pluginClass: KoraIDVFlutterPlugin
